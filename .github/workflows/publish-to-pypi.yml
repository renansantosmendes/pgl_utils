name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'pgl_utils/**'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/publish-to-pypi.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Run tests
        run: uv run pytest tests/ -v --cov=pgl_utils --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Create venv
        run: uv venv

      - name: Install build dependencies
        run: uv pip install build twine wheel setuptools

      - name: Get version
        id: version
        run: |
          VERSION=$(uv run python -c "import re; content=open('setup.py').read(); match=re.search(r\"version=['\\\"]([^'\\\"]+)['\\\"]\", content); print(match.group(1) if match else '0.1.0')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build distribution
        run: uv run python -m build

      - name: Check distribution
        run: uv run twine check dist/*
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            Published to PyPI: https://pypi.org/project/pgl-utils/${{ steps.version.outputs.version }}/
            
            Install with:
            ```bash
            pip install pgl-utils==${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
